services:
  - type: web
    name: heritage-bank
    runtime: node
    region: oregon
    plan: free
    
    # Build configuration
    buildCommand: bash backend/render-build.sh
    startCommand: node backend/server.js
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    
    # Health check
    healthCheckPath: /api/health
    
    # Logging
    logging:
      enabled: true
