name: Mirror to moretoo1234

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Mirror to moretoo1234
        env:
          MIRROR_TOKEN: ${{ secrets.MORETOO_MIRROR_TOKEN }}
        run: |
          git remote add mirror https://x-access-token:${MIRROR_TOKEN}@github.com/moretoo1234/heritage-bank.git || true
          git push mirror main --force
